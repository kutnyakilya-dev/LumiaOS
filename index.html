<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Игра: Мастер Садовник - Прогрессия</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(to bottom, #87CEEB, #E0F7FA);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }

        #ui-top {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
            z-index: 10;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.9);
            padding: 8px 15px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            font-size: 1rem;
            color: #2E7D32;
            border: 2px solid #A5D6A7;
        }

        #xp-bar-container {
            width: 200px;
            height: 12px;
            background: #eee;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #A5D6A7;
        }

        #xp-bar-fill {
            height: 100%;
            background: #4CAF50;
            transition: width 0.3s;
            width: 0%;
        }

        #shop {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 10;
            max-height: 80vh;
            overflow-y: auto;
        }

        .shop-section {
            border-top: 1px solid #ddd;
            padding-top: 10px;
            margin-top: 5px;
        }

        .shop-item {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 5px;
            text-align: center;
        }

        .shop-item.locked { background: #f5f5f5; color: #999; cursor: not-allowed; }
        .shop-item:not(.locked):hover { background: #e8f5e9; }
        .item-name { font-weight: bold; display: block; font-size: 0.9rem; }
        .item-price { font-size: 0.8rem; color: #e64a19; }

        #sell-btn {
            position: absolute;
            bottom: 140px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 25px;
            background: #FFC107;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            display: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 20;
        }

        #rarity-toast {
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            font-weight: bold;
            font-size: 1.8rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s;
        }

        canvas { display: block; }
    </style>
</head>
<body>

    <div id="ui-top">
        <div class="stat-card">Баланс: <span id="money">10</span> $</div>
        <div class="stat-card">
            Уровень: <span id="lvl">1</span>
            <div id="xp-bar-container"><div id="xp-bar-fill"></div></div>
            <small>XP: <span id="xp-val">0</span> / <span id="xp-max">50</span></small>
        </div>
        <div class="stat-card">Семена: <span id="seedCount">0</span> <span id="currentTypeDisplay"></span></div>
    </div>

    <div id="rarity-toast"></div>

    <div id="shop">
        <div style="text-align:center; font-weight:bold;">МАГАЗИН</div>
        
        <div class="shop-section">
            <small>СЕМЕНА</small>
            <div id="seeds-list"></div>
        </div>

        <div class="shop-section">
            <small>ИНВЕНТАРЬ</small>
            <div id="pots-list"></div>
        </div>

        <button onclick="resetGame()" style="margin-top:10px; font-size:0.6rem; opacity:0.5; border:none; background:none; cursor:pointer;">Сбросить всё</button>
    </div>

    <button id="sell-btn" onclick="sellPlant()">Собрать урожай!</button>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Версия игры для контроля сохранений
        const GAME_VERSION = "1.0.2"; 

        const XP_TABLE = [
            { lvl: 1, xp: 0 },
            { lvl: 2, xp: 50 },
            { lvl: 3, xp: 200 },
            { lvl: 4, xp: 500 },
            { lvl: 5, xp: 1200 }
        ];

        const PLANTS_DATA = {
            'Daisy': { name: 'Ромашка', buy: 10, sell: 15, time: 30, color: '#FFFFFF', xp: 10, minLvl: 1 },
            'Tulip': { name: 'Тюльпан', buy: 25, sell: 45, time: 120, color: '#FF5252', xp: 25, minLvl: 2 },
            'Rose':  { name: 'Роза', buy: 100, sell: 250, time: 600, color: '#D32F2F', xp: 100, minLvl: 3 },
            'Lily':  { name: 'Лилия', buy: 300, sell: 800, time: 1800, color: '#E1BEE7', xp: 350, minLvl: 4 },
            'ExoticTree': { name: 'Дерево', buy: 1000, sell: 4000, time: 3600, color: '#FF9800', xp: 1500, minLvl: 5 }
        };

        const POT_COSTS = { 2: 100, 3: 500, 4: 2000 };

        const RARITIES = {
            'Normal':  { label: 'Обычный', multiplier: 1, xpMultiplier: 1, color: null },
            'Golden':  { label: 'Золотой!', multiplier: 3, xpMultiplier: 2, color: '#FFD700' },
            'Diamond': { label: 'Алмазный!!', multiplier: 10, xpMultiplier: 5, color: '#B9F2FF' },
            'Rainbow': { label: 'РАДУЖНЫЙ!!!', multiplier: 50, xpMultiplier: 20, color: 'rainbow' }
        };

        let wallet = 10;
        let totalXP = 0;
        let inventory = { type: null, count: 0 };
        let potsCount = 1;
        let pots = [];
        let selectedPotIndex = 0;
        let windAngle = 0;
        let rainbowHue = 0;

        function saveGame() {
            const data = {
                version: GAME_VERSION,
                wallet,
                totalXP,
                inventory,
                potsCount,
                pots
            };
            localStorage.setItem('gardener_master_save', JSON.stringify(data));
        }

        function loadGame() {
            const saved = localStorage.getItem('gardener_master_save');
            if (saved) {
                const d = JSON.parse(saved);
                
                // Миграция данных: перенос значений с проверкой на существование
                wallet = d.wallet ?? 10;
                totalXP = d.totalXP ?? 0;
                inventory = d.inventory ?? { type: null, count: 0 };
                potsCount = d.potsCount ?? 1;
                
                // Если структура горшков изменилась в обновлении, дополняем её
                if (d.pots) {
                    pots = d.pots.map(p => ({
                        type: p?.type ?? null,
                        rarity: p?.rarity ?? 'Normal',
                        stage: p?.stage ?? 0,
                        currentHeight: p?.currentHeight ?? 0,
                        lastUpdate: p?.lastUpdate ?? 0
                    }));
                } else {
                    initPots();
                }
            } else {
                initPots();
            }
            updateUI();
        }

        function initPots() {
            pots = Array(4).fill(null).map(() => ({
                type: null, rarity: 'Normal', stage: 0, currentHeight: 0, lastUpdate: 0
            }));
        }

        function resetGame() {
            localStorage.removeItem('gardener_master_save');
            location.reload();
        }

        function getLevelData() {
            let current = XP_TABLE[0];
            for (let i = XP_TABLE.length - 1; i >= 0; i--) {
                if (totalXP >= XP_TABLE[i].xp) {
                    current = XP_TABLE[i];
                    break;
                }
            }
            const next = XP_TABLE[XP_TABLE.indexOf(current) + 1] || null;
            return { current, next };
        }

        function updateUI() {
            const lvlData = getLevelData();
            document.getElementById('money').innerText = Math.floor(wallet);
            document.getElementById('lvl').innerText = lvlData.current.lvl;
            document.getElementById('xp-val').innerText = totalXP;
            
            if (lvlData.next) {
                document.getElementById('xp-max').innerText = lvlData.next.xp;
                const progress = ((totalXP - lvlData.current.xp) / (lvlData.next.xp - lvlData.current.xp)) * 100;
                document.getElementById('xp-bar-fill').style.width = progress + '%';
            } else {
                document.getElementById('xp-max').innerText = 'MAX';
                document.getElementById('xp-bar-fill').style.width = '100%';
            }

            document.getElementById('seedCount').innerText = inventory.count;
            document.getElementById('currentTypeDisplay').innerText = inventory.type ? `(${PLANTS_DATA[inventory.type].name})` : '';

            renderShop(lvlData.current.lvl);
            
            const active = pots[selectedPotIndex];
            const sellBtn = document.getElementById('sell-btn');
            if (active && active.stage === 5) {
                const price = PLANTS_DATA[active.type].sell * RARITIES[active.rarity].multiplier;
                sellBtn.innerText = `Собрать урожай за ${price}$`;
                sellBtn.style.display = 'block';
            } else {
                sellBtn.style.display = 'none';
            }
        }

        function renderShop(currentLvl) {
            const seedsDiv = document.getElementById('seeds-list');
            seedsDiv.innerHTML = '';
            for (let key in PLANTS_DATA) {
                const p = PLANTS_DATA[key];
                const locked = currentLvl < p.minLvl;
                const item = document.createElement('div');
                item.className = `shop-item ${locked ? 'locked' : ''}`;
                item.innerHTML = `<span class="item-name">${p.name} ${locked ? '(Lvl '+p.minLvl+')' : ''}</span><span class="item-price">${p.buy}$</span>`;
                if (!locked) item.onclick = () => buySeed(key);
                seedsDiv.appendChild(item);
            }

            const potsDiv = document.getElementById('pots-list');
            potsDiv.innerHTML = '';
            const nextPotIndex = potsCount + 1;
            if (POT_COSTS[nextPotIndex]) {
                const cost = POT_COSTS[nextPotIndex];
                const reqLvl = nextPotIndex === 2 ? 2 : (nextPotIndex === 3 ? 4 : 5);
                const locked = currentLvl < reqLvl;
                const item = document.createElement('div');
                item.className = `shop-item ${locked ? 'locked' : ''}`;
                item.innerHTML = `<span class="item-name">Горшок #${nextPotIndex} ${locked ? '(Lvl '+reqLvl+')' : ''}</span><span class="item-price">${cost}$</span>`;
                if (!locked) item.onclick = () => buyPot(nextPotIndex, cost);
                potsDiv.appendChild(item);
            }
        }

        function buySeed(type) {
            const p = PLANTS_DATA[type];
            if (wallet >= p.buy && (inventory.type === null || inventory.type === type)) {
                wallet -= p.buy;
                inventory.type = type;
                inventory.count++;
                updateUI();
                saveGame();
            }
        }

        function buyPot(idx, cost) {
            if (wallet >= cost && potsCount < idx) {
                wallet -= cost;
                potsCount = idx;
                updateUI();
                saveGame();
            }
        }

        function sellPlant() {
            const p = pots[selectedPotIndex];
            if (p && p.stage === 5) {
                const data = PLANTS_DATA[p.type];
                const rData = RARITIES[p.rarity];
                
                wallet += data.sell * rData.multiplier;
                totalXP += data.xp * rData.xpMultiplier;
                
                pots[selectedPotIndex] = { type: null, rarity: 'Normal', stage: 0, currentHeight: 0, lastUpdate: 0 };
                updateUI();
                saveGame();
            }
        }

        function rollRarity() {
            const r = Math.random();
            if (r < 0.01) return 'Rainbow';
            if (r < 0.05) return 'Diamond';
            if (r < 0.15) return 'Golden';
            return 'Normal';
        }

        function showToast(rarity) {
            const t = document.getElementById('rarity-toast');
            const r = RARITIES[rarity];
            t.innerText = r.label;
            t.style.color = r.color === 'rainbow' ? 'white' : r.color;
            t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 2000);
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function drawLeaf(x, y, size, angle, side) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            const grad = ctx.createLinearGradient(0, 0, size * side, 0);
            grad.addColorStop(0, '#4CAF50'); grad.addColorStop(1, '#1B5E20');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.quadraticCurveTo(size * side, -size, size * side * 2, 0);
            ctx.quadraticCurveTo(size * side, size, 0, 0);
            ctx.fill();
            ctx.restore();
        }

        function drawPlant(p, centerX, bottomY) {
            if (!p.type || p.stage === 0) return;
            const target = p.stage * 25;
            if (p.currentHeight < target) p.currentHeight += 0.2;
            const sway = Math.sin(windAngle) * (p.currentHeight * 0.05);
            const topY = bottomY - p.currentHeight;

            if (p.rarity !== 'Normal') {
                ctx.save();
                ctx.shadowBlur = 15;
                ctx.shadowColor = p.rarity === 'Golden' ? '#FFD700' : (p.rarity === 'Diamond' ? '#00E5FF' : `hsl(${rainbowHue},100%,50%)`);
            }

            ctx.strokeStyle = '#2E7D32';
            ctx.lineWidth = 3 + (p.stage);
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(centerX, bottomY);
            ctx.bezierCurveTo(centerX, bottomY - p.currentHeight/2, centerX + sway, bottomY - p.currentHeight/2, centerX + sway, topY);
            ctx.stroke();

            if (p.stage >= 2) drawLeaf(centerX + sway/3, bottomY - p.currentHeight/3, 10, -0.5, 1);
            if (p.stage >= 3) drawLeaf(centerX + sway/2, bottomY - p.currentHeight/1.8, 12, 0.5, -1);

            if (p.stage === 5) {
                ctx.save();
                ctx.translate(centerX + sway, topY);
                const pColor = p.rarity === 'Normal' ? PLANTS_DATA[p.type].color : (p.rarity === 'Golden' ? '#FFD700' : (p.rarity === 'Diamond' ? '#B9F2FF' : `hsl(${rainbowHue},100%,60%)`));
                ctx.fillStyle = pColor;
                for (let i = 0; i < 8; i++) {
                    ctx.rotate(Math.PI / 4);
                    ctx.beginPath(); ctx.ellipse(15, 0, 12, 6, 0, 0, Math.PI * 2); ctx.fill();
                }
                ctx.fillStyle = '#F57C00';
                ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            }
            if (p.rarity !== 'Normal') ctx.restore();
        }

        canvas.addEventListener('mousedown', (e) => {
            const tableTop = canvas.height - 120;
            const startX = canvas.width/2 - ((potsCount-1)*60);
            
            for(let i=0; i<potsCount; i++) {
                const px = startX + i*120;
                if (Math.abs(e.clientX - px) < 50 && e.clientY > tableTop - 80 && e.clientY < tableTop + 20) {
                    selectedPotIndex = i;
                    if (inventory.count > 0 && pots[i].stage === 0) {
                        pots[i].type = inventory.type;
                        pots[i].rarity = rollRarity();
                        pots[i].stage = 1;
                        pots[i].lastUpdate = Date.now();
                        inventory.count--;
                        if (inventory.count === 0) inventory.type = null;
                        if (pots[i].rarity !== 'Normal') showToast(pots[i].rarity);
                        saveGame();
                    }
                    updateUI();
                    break;
                }
            }
        });

        function gameLoop() {
            windAngle += 0.02;
            rainbowHue = (rainbowHue + 2) % 360;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Table
            ctx.fillStyle = '#5D4037';
            ctx.fillRect(0, canvas.height - 120, canvas.width, 120);
            ctx.fillStyle = '#795548';
            ctx.fillRect(0, canvas.height - 120, canvas.width, 15);

            // Pots
            const tableTop = canvas.height - 120;
            const startX = canvas.width/2 - ((potsCount-1)*60);
            
            for(let i=0; i<potsCount; i++) {
                const px = startX + i*120;
                
                // Pot body
                ctx.fillStyle = '#E64A19';
                ctx.beginPath();
                ctx.moveTo(px-30, tableTop); ctx.lineTo(px+30, tableTop);
                ctx.lineTo(px+40, tableTop-60); ctx.lineTo(px-40, tableTop-60);
                ctx.closePath(); ctx.fill();

                // Dirt
                ctx.fillStyle = '#3E2723';
                ctx.beginPath(); ctx.ellipse(px, tableTop-58, 35, 6, 0, 0, Math.PI*2); ctx.fill();

                drawPlant(pots[i], px, tableTop-58);

                // Rim
                ctx.fillStyle = '#D84315';
                ctx.fillRect(px-45, tableTop-60, 90, 12);

                // Growth Logic
                const p = pots[i];
                if (p.type && p.stage > 0 && p.stage < 5) {
                    const stageTime = (PLANTS_DATA[p.type].time * 1000) / 4;
                    if (Date.now() - p.lastUpdate >= stageTime) {
                        p.stage++;
                        p.lastUpdate = Date.now();
                        saveGame();
                        if (i === selectedPotIndex) updateUI();
                    }
                }
            }

            requestAnimationFrame(gameLoop);
        }

        window.onload = () => {
            resize();
            window.addEventListener('resize', resize);
            loadGame();
            gameLoop();
        };
    </script>
</body>
</html>
